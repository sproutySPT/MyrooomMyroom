<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내방내방</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">

<style>
* { box-sizing: border-box; }

body {
    background:#121212;
    color:white;
    font-family:Arial, sans-serif;
    padding:16px;
    margin:0;
}

.section {
    background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    padding:16px;
    margin-bottom:20px;
    border-radius:14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.22);
}

button {
    padding:16px;
    margin:6px;
    background:#2c2c2c;
    color:white;
    border:none;
    border-radius:12px;
    width:30%;
    min-width:92px;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

button:active {
    transform:scale(0.96);
}

#openAchievementsBtn {
    position:fixed;
    top:10px;
    right:10px;
    width:auto;
    min-width:56px;
    padding:12px 14px;
    z-index:99990;
    border-radius:14px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    font-size:22px;
}

#openDiaryBtn {
    position:fixed;
    top:10px;
    right:74px;
    width:56px;
    height:56px;
    min-width:56px;
    padding:0;
    margin:0;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:99991;
    border-radius:18px;
    background:linear-gradient(135deg, rgba(214,196,255,0.92), rgba(178,145,255,0.72), rgba(155,120,255,0.58));
    border:1px solid rgba(255,255,255,0.22);
    box-shadow:
        0 10px 24px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.22),
        inset 0 -10px 24px rgba(255,255,255,0.08);
    backdrop-filter: blur(18px) saturate(150%);
    -webkit-backdrop-filter: blur(18px) saturate(150%);
    font-size:22px;
    line-height:1;
    color:#fff;
    text-shadow:0 1px 8px rgba(0,0,0,0.18);
}

#openDiaryBtn:active { transform:scale(0.96); }

#openCameraGalleryBtn {
    position:fixed;
    top:10px;
    right:138px;
    width:56px;
    height:56px;
    min-width:56px;
    padding:0;
    margin:0;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:99992;
    border-radius:18px;
    background:linear-gradient(135deg, rgba(255,210,140,0.92), rgba(255,160,80,0.72), rgba(255,100,60,0.58));
    border:1px solid rgba(255,255,255,0.22);
    box-shadow:
        0 10px 24px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.22),
        inset 0 -10px 24px rgba(255,255,255,0.08);
    backdrop-filter: blur(18px) saturate(150%);
    -webkit-backdrop-filter: blur(18px) saturate(150%);
    font-size:22px;
    line-height:1;
    color:#fff;
    text-shadow:0 1px 8px rgba(0,0,0,0.18);
}

#openCameraGalleryBtn:active { transform:scale(0.96); }

.selected {
    transform:scale(1.08);
    border:2px solid white;
    background:linear-gradient(90deg,#4CAF50,#00ffcc) !important;
    box-shadow:0 0 18px rgba(0,255,204,0.35);
}

.good { background:linear-gradient(90deg,#4CAF50,#00ffcc) !important; }
.normal { background:linear-gradient(90deg,#ffd54f,#ffb300) !important; color:#111; }
.bad { background:linear-gradient(90deg,#ff5252,#ff1744) !important; }
.full { background:linear-gradient(90deg,#00bcd4,#00ffcc) !important; }

input, textarea {
    width:100%;
    background:#222;
    color:white;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    padding:12px;
    margin-top:8px;
    font-size:16px;
    outline:none;
}

textarea {
    min-height:88px;
    resize:vertical;
}

.snack-item {
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
    flex-wrap:wrap;
}

.snack-item:last-child { border-bottom:none; }

.snack-item input[type="text"] {
    flex:1;
    min-width:180px;
    margin-top:0;
}

.snack-item input[type="checkbox"] {
    width:20px;
    height:20px;
    accent-color:#00ffcc;
    margin:0;
}

.snack-item label { flex:1; }

.snack-action-btn {
    width:auto !important;
    min-width:64px !important;
    padding:10px 12px !important;
    margin:0 !important;
    border-radius:10px !important;
    font-size:14px !important;
}

.stats-summary {
    background: linear-gradient(135deg, rgba(76,175,80,0.18), rgba(0,255,204,0.10));
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(16px);
    border-radius:18px;
    padding:14px;
    margin-bottom:14px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.26);
}

.stats-grid {
    display:flex;
    flex-direction:column;
    gap:12px;
}

.stat-card {
    position:relative;
    overflow:hidden;
    background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(16px);
    border-radius:18px;
    padding:14px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.22);
}

.stat-card::after {
    content:"";
    position:absolute;
    inset:auto -30% -35% auto;
    width:160px;
    height:160px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(0,255,204,0.18), transparent 65%);
    pointer-events:none;
}

.stat-date {
    font-weight:800;
    font-size:16px;
    margin-bottom:10px;
}

.stat-row {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:8px;
}

.stat-pill {
    display:inline-flex;
    align-items:center;
    padding:6px 10px;
    border-radius:999px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.10);
    font-size:13px;
    line-height:1;
}

.stat-pill.good { background:linear-gradient(90deg, rgba(76,175,80,0.95), rgba(0,255,204,0.95)); color:#fff; }
.stat-pill.normal { background:linear-gradient(90deg, rgba(255,213,79,0.95), rgba(255,179,0,0.95)); color:#111; }
.stat-pill.bad { background:linear-gradient(90deg, rgba(255,82,82,0.95), rgba(255,23,68,0.95)); color:#fff; }
.stat-pill.full { background:linear-gradient(90deg, rgba(0,188,212,0.95), rgba(0,255,204,0.95)); color:#fff; }

.stat-note {
    font-size:13px;
    line-height:1.45;
    color:rgba(255,255,255,0.88);
    margin-top:6px;
}

/* ── 카메라 섹션 ── */
.camera-section-header {
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
}

.camera-section-header h2 { margin:0; }

.camera-btn-group {
    display:flex;
    gap:8px;
}

.cam-btn {
    width:auto !important;
    min-width:auto !important;
    padding:10px 14px !important;
    margin:0 !important;
    border-radius:12px !important;
    font-size:14px !important;
    display:flex;
    align-items:center;
    gap:6px;
}

.cam-btn.primary {
    background:linear-gradient(135deg, rgba(255,160,80,0.9), rgba(255,100,60,0.8)) !important;
    border:1px solid rgba(255,255,255,0.18);
}

.cam-btn.secondary {
    background:rgba(255,255,255,0.10) !important;
    border:1px solid rgba(255,255,255,0.14);
}

#photoGrid {
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
}

.photo-thumb-wrap {
    position:relative;
    aspect-ratio:1;
    border-radius:14px;
    overflow:hidden;
    background:#1a1a1a;
    border:1px solid rgba(255,255,255,0.08);
    cursor:pointer;
    transition:0.2s;
}

.photo-thumb-wrap:hover { transform:scale(1.03); }

.photo-thumb-wrap img {
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.photo-thumb-date {
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    background:linear-gradient(transparent, rgba(0,0,0,0.72));
    padding:18px 6px 6px;
    font-size:11px;
    font-weight:700;
    color:rgba(255,255,255,0.9);
    text-align:center;
}

.photo-thumb-del {
    position:absolute;
    top:5px;
    right:5px;
    width:24px !important;
    height:24px !important;
    min-width:0 !important;
    padding:0 !important;
    margin:0 !important;
    border-radius:50% !important;
    background:rgba(0,0,0,0.55) !important;
    border:1px solid rgba(255,255,255,0.18);
    font-size:13px !important;
    line-height:1 !important;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    opacity:0;
    transition:0.18s;
}

.photo-thumb-wrap:hover .photo-thumb-del { opacity:1; }

.photo-empty {
    grid-column: 1 / -1;
    text-align:center;
    padding:28px 0;
    color:rgba(255,255,255,0.5);
    font-size:14px;
    line-height:1.6;
}

/* ── 사진 전체화면 뷰어 ── */
#photoViewer {
    display:none;
    position:fixed;
    inset:0;
    z-index:200000;
    background:rgba(0,0,0,0.92);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
}

#photoViewer.open { display:flex; }

#photoViewerImg {
    max-width:100%;
    max-height:72vh;
    border-radius:18px;
    box-shadow:0 24px 60px rgba(0,0,0,0.5);
    object-fit:contain;
}

#photoViewerMeta {
    margin-top:14px;
    text-align:center;
    font-size:14px;
    color:rgba(255,255,255,0.78);
    line-height:1.5;
}

#photoViewerClose {
    position:absolute;
    top:18px;
    right:18px;
    width:44px !important;
    height:44px !important;
    min-width:0 !important;
    padding:0 !important;
    margin:0 !important;
    border-radius:14px !important;
    background:rgba(255,255,255,0.12) !important;
    border:1px solid rgba(255,255,255,0.18);
    font-size:20px !important;
    display:flex;
    align-items:center;
    justify-content:center;
}

#photoViewerNav {
    display:flex;
    gap:12px;
    margin-top:16px;
}

.viewer-nav-btn {
    width:auto !important;
    min-width:52px !important;
    padding:12px 18px !important;
    margin:0 !important;
    border-radius:14px !important;
    background:rgba(255,255,255,0.10) !important;
    border:1px solid rgba(255,255,255,0.14);
    font-size:18px !important;
}

/* ── 카메라 갤러리 오버레이 ── */
#cameraGalleryModal {
    display:none;
    position:fixed;
    inset:0;
    z-index:100000;
    background:rgba(10,10,20,0.72);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding:16px;
    overflow:auto;
}

.cameraGalleryPanel {
    max-width:760px;
    margin:24px auto;
    background:linear-gradient(180deg, rgba(255,210,140,0.14), rgba(255,255,255,0.06));
    border:1px solid rgba(255,255,255,0.12);
    border-radius:24px;
    box-shadow:0 20px 50px rgba(0,0,0,0.36);
    padding:16px;
}

.galleryTopBar {
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
    margin-bottom:16px;
}

.galleryTopBar h2 { margin:0; }

.galleryCloseBtn {
    width:auto !important;
    min-width:44px !important;
    height:44px;
    padding:0 14px !important;
    margin:0 !important;
    border-radius:14px !important;
    background:rgba(255,255,255,0.10);
    border:1px solid rgba(255,255,255,0.12);
}

.galleryFilterBar {
    display:flex;
    gap:8px;
    margin-bottom:14px;
    flex-wrap:wrap;
}

.galleryFilterBtn {
    width:auto !important;
    min-width:auto !important;
    padding:8px 14px !important;
    margin:0 !important;
    border-radius:999px !important;
    font-size:13px !important;
    background:rgba(255,255,255,0.08) !important;
    border:1px solid rgba(255,255,255,0.10);
}

.galleryFilterBtn.active {
    background:linear-gradient(90deg, rgba(255,160,80,0.9), rgba(255,100,60,0.8)) !important;
    border-color:rgba(255,255,255,0.2);
}

#galleryGrid {
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
}

/* ── 도전과제 화면 ── */
#achievementScreen {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:linear-gradient(180deg, #111, #171717);
    padding:20px;
    overflow:auto;
    z-index:3000;
}

#achievementScreen h2 { margin-top:8px; }

.progress-bar {
    height:12px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
}

.progress-fill {
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#4CAF50,#00ffcc);
    transition:0.8s;
}

.achievement {
    position:relative;
    overflow:hidden;
    padding:15px;
    margin-bottom:12px;
    border-radius:16px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    transition:0.25s;
}

.achievement:hover { transform:translateY(-1px); }
.achievement.locked { opacity:0.42; }

.achievement.unlocked {
    background:linear-gradient(90deg,#4CAF50,#00ffcc);
    color:#fff;
    box-shadow:0 0 20px rgba(0,255,204,0.18);
}

.ach-title { font-weight:800; font-size:16px; margin-bottom:4px; }
.ach-desc { font-size:13px; opacity:0.92; margin-bottom:8px; }

.ach-meta {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
    font-size:12px;
    opacity:0.92;
    margin-bottom:8px;
}

/* ── 불꽃 ── */
.firework {
    position:fixed;
    width:7px; height:7px;
    border-radius:50%;
    pointer-events:none;
    z-index:999999;
    animation:explode 900ms ease-out forwards;
}

@keyframes explode {
    0% { transform:translate(0,0) scale(1); opacity:1; }
    100% { transform:translate(var(--x), var(--y)) scale(0.3); opacity:0; }
}

/* ── 달력 오버레이 ── */
.calendarOverlay {
    display:none;
    position:fixed;
    inset:0;
    z-index:100000;
    background:rgba(10,10,20,0.72);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding:16px;
    overflow:auto;
}

.calendarPanel {
    max-width:760px;
    margin:24px auto;
    background:linear-gradient(180deg, rgba(210,190,255,0.16), rgba(255,255,255,0.06));
    border:1px solid rgba(255,255,255,0.12);
    border-radius:24px;
    box-shadow:0 20px 50px rgba(0,0,0,0.36);
    padding:16px;
}

.calendarTopBar {
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
}

.calendarTopBar h2 { margin:0; }

.calendarSub {
    margin:6px 0 0;
    font-size:13px;
    color:rgba(255,255,255,0.76);
}

.calendarCloseBtn {
    width:auto !important;
    min-width:44px !important;
    height:44px;
    padding:0 14px !important;
    margin:0 !important;
    border-radius:14px !important;
    background:rgba(255,255,255,0.10);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(16px);
}

.calendarNav {
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin:16px 0 12px;
}

.calendarNav button {
    width:auto !important;
    min-width:52px !important;
    padding:12px 14px !important;
    margin:0 !important;
    border-radius:14px !important;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.10);
}

.calendarMonthLabel {
    flex:1;
    text-align:center;
    font-weight:800;
    font-size:18px;
}

.calendarWeekdays,
.calendarGrid {
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:8px;
}

.calendarWeekdays {
    margin-bottom:8px;
    font-size:12px;
    color:rgba(255,255,255,0.72);
    text-align:center;
}

.calendarDay {
    width:100% !important;
    min-width:0 !important;
    margin:0 !important;
    min-height:66px;
    border-radius:18px;
    padding:10px;
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    cursor:pointer;
    transition:0.2s;
    position:relative;
    overflow:hidden;
    color:white;
    text-align:left;
}

.calendarDay:hover { transform:translateY(-1px); border-color:rgba(255,255,255,0.18); }
.calendarDay.empty { background:transparent; border:1px solid transparent; cursor:default; box-shadow:none; }
.calendarDay.today { background:linear-gradient(135deg, rgba(203,172,255,0.28), rgba(173,135,255,0.16)); border-color:rgba(255,255,255,0.18); }
.calendarDay.hasEntry { background:linear-gradient(135deg, rgba(197,173,255,0.32), rgba(137,104,255,0.18)); border-color:rgba(255,255,255,0.18); }
.calendarDay.selected { outline:2px solid rgba(255,255,255,0.85); }
.calendarDayNum { font-weight:800; font-size:15px; }
.calendarDayDot { font-size:12px; opacity:0.9; }

.memoPanel {
    margin-top:14px;
    padding:14px;
    border-radius:20px;
    background:linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
    border:1px solid rgba(255,255,255,0.10);
}

.memoDate { font-weight:800; font-size:16px; margin-bottom:10px; }

.memoTimeline { display:flex; flex-direction:column; gap:10px; }

.memoItem {
    padding:12px;
    border-radius:16px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
}

.memoItemTitle { font-weight:700; margin-bottom:6px; }

.memoItemMeta {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:8px;
    font-size:12px;
    opacity:0.9;
}

.memoItemText {
    white-space:pre-wrap;
    line-height:1.55;
    font-size:14px;
    color:rgba(255,255,255,0.92);
}

.memoEmpty {
    font-size:14px;
    color:rgba(255,255,255,0.72);
    line-height:1.5;
}
</style>
</head>

<body>

<button id="openAchievementsBtn" type="button">🏆</button>
<button id="openDiaryBtn" type="button" aria-label="메모 달력 열기">📒</button>
<button id="openCameraGalleryBtn" type="button" aria-label="사진 갤러리 열기">📷</button>

<!-- 숨겨진 파일 입력 -->
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
<input type="file" id="galleryInput" accept="image/*" style="display:none">

<div id="mainScreen">

    <div class="section">
        <h2>방 컨디션</h2>
        <button data-condition="좋음" type="button">좋음</button>
        <button data-condition="보통" type="button">보통</button>
        <button data-condition="나쁨" type="button">나쁨</button>
        <p id="conditionDisplay">선택한 방 컨디션: 없음</p>
    </div>

    <div class="section">
        <h2>간식 상태</h2>
        <button data-basket="가득" type="button">가득</button>
        <button data-basket="보통" type="button">보통</button>
        <button data-basket="적음" type="button">적음</button>
        <p id="basketDisplay">선택한 간식 상태: 없음</p>
    </div>

    <div class="section">
        <div style="display:flex; align-items:center; justify-content:space-between; cursor:pointer;" id="snackToggleHeader">
            <h2 style="margin:0;">간식 목록</h2>
            <span id="snackToggleIcon" style="font-size:20px; transition:transform 0.25s;">▲</span>
        </div>
        <div id="snackBody" style="margin-top:12px;">
            <button id="addSnackBtn" type="button">간식 추가</button>
            <button id="resetSnackBtn" type="button">간식 초기화</button>
            <div id="snackList"></div>
        </div>
    </div>

    <!-- 📷 방 사진 기록 -->
    <div class="section">

<script>
(function() {
    const TODO_KEY = 'todoItems';
    let todoFilter = 'all';
    let todoOpen = true;

    function loadTodos() {
        try {
            const raw = localStorage.getItem(TODO_KEY);
            return raw ? JSON.parse(raw) : [];
        } catch { return []; }
    }

    function saveTodos(todos) {
        localStorage.setItem(TODO_KEY, JSON.stringify(todos));
    }

    function renderTodos() {
        const todos = loadTodos();
        const list  = document.getElementById('todoList');
        const fill  = document.getElementById('todoProgressFill');
        const stats = document.getElementById('todoStatsText');

        const done  = todos.filter(t => t.done).length;
        const total = todos.length;
        const pct   = total ? Math.round((done / total) * 100) : 0;
        fill.style.width = pct + '%';
        stats.textContent = `${done} / ${total}`;

        const filtered = todos.filter(t => {
            if (todoFilter === 'todo') return !t.done;
            if (todoFilter === 'done') return t.done;
            return true;
        });

        list.innerHTML = '';

        if (filtered.length === 0) {
            list.innerHTML = `<div class="todo-empty">${
                todoFilter === 'done' ? '완료한 항목이 없어요 💪' :
                todoFilter === 'todo' ? '할 일이 없어요 🎉' :
                '할 일을 추가해봐요!'
            }</div>`;
            return;
        }

        filtered.forEach((todo, filteredIdx) => {
            const realIdx = todos.findIndex(t => t.id === todo.id);

            const item = document.createElement('div');
            item.className = 'todo-item' + (todo.done ? ' done' : '');

            const checkBtn = document.createElement('button');
            checkBtn.type = 'button';
            checkBtn.className = 'todo-check';
            checkBtn.textContent = todo.done ? '✓' : '';
            checkBtn.addEventListener('click', () => {
                const cur = loadTodos();
                cur[realIdx].done = !cur[realIdx].done;
                saveTodos(cur);
                renderTodos();
            });

            const text = document.createElement('div');
            text.className = 'todo-text';
            text.textContent = todo.text;

            const delBtn = document.createElement('button');
            delBtn.type = 'button';
            delBtn.className = 'todo-del-btn';
            delBtn.textContent = '✕';
            delBtn.addEventListener('click', () => {
                const cur = loadTodos();
                cur.splice(realIdx, 1);
                saveTodos(cur);
                renderTodos();
            });

            item.appendChild(checkBtn);
            item.appendChild(text);
            item.appendChild(delBtn);
            list.appendChild(item);
        });
    }

    function addTodo() {
        const input = document.getElementById('todoInput');
        const text  = input.value.trim();
        if (!text) { input.focus(); return; }

        const todos = loadTodos();
        todos.push({ id: Date.now(), text, done: false });
        saveTodos(todos);
        input.value = '';
        renderTodos();
    }

    // 접고펴기
    document.getElementById('todoToggleHeader').addEventListener('click', () => {
        todoOpen = !todoOpen;
        document.getElementById('todoBody').style.display = todoOpen ? 'block' : 'none';
        document.getElementById('todoToggleIcon').style.transform = todoOpen ? 'rotate(0deg)' : 'rotate(180deg)';
    });

    // 추가
    document.getElementById('todoAddBtn').addEventListener('click', addTodo);
    document.getElementById('todoInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); addTodo(); }
    });

    // 필터
    document.querySelectorAll('.todo-filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            todoFilter = btn.dataset.filter;
            document.querySelectorAll('.todo-filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTodos();
        });
    });

    // 완료 삭제
    document.getElementById('todoClearBtn').addEventListener('click', () => {
        saveTodos(loadTodos().filter(t => !t.done));
        renderTodos();
    });

    renderTodos();
})();
</script>

function getLocalDateKey(date = new Date()) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

function formatKoreanDate(dateKey) {
    const [y, m, d] = dateKey.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    return `${date.getFullYear()}년 ${date.getMonth() + 1}월 ${date.getDate()}일`;
}

function escapeHtml(text) {
    return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
}

function parseDateKey(dateKey) {
    const [y, m, d] = String(dateKey).split('-').map(Number);
    return new Date(y, m - 1, d);
}

function isConsecutiveDay(olderKey, newerKey) {
    const older = parseDateKey(olderKey);
    const newer = parseDateKey(newerKey);
    return Math.round((newer.getTime() - older.getTime()) / 86400000) === 1;
}

function hasMemo(log) {
    return String(log.memo || '').trim().length > 0 || String(log.postcardMemo || '').trim().length > 0;
}

                basket: String(item.basket || ''),
                snackCount: Number(item.snackCount || 0),
                postcardCount: Number(item.postcardCount || 0),
                memo: String(item.memo || ''),
                postcardMemo: String(item.postcardMemo || ''),
                snacks: Array.isArray(item.snacks) ? item.snacks : [],
                savedAt: String(item.savedAt || '')
            }))
            .sort((a, b) => a.date.localeCompare(b.date));
    } catch { return []; }
}

function saveLogs(logs) {
    const clean = Array.isArray(logs) ? logs : [];
    clean.sort((a, b) => String(a.date).localeCompare(String(b.date)));
    localStorage.setItem(LOG_KEY, JSON.stringify(clean.slice(-365)));
}

function loadPhotos() {

        const parsed = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(parsed)) return [];
        return parsed;
    } catch { return []; }
}

function savePhotos(photos) {
    localStorage.setItem(PHOTOS_KEY, JSON.stringify(photos));
}

function addPhoto(dataUrl) {
    const photos = loadPhotos();
    const id = Date.now() + Math.random().toString(36).slice(2);
    photos.push({
        id,
        date: getLocalDateKey(),
        dataUrl,
        caption: ''
    });
    savePhotos(photos);
    renderPhotoGrid();
    checkAchievements();
}

function deletePhoto(id) {
    const photos = loadPhotos().filter(p => p.id !== id);
    savePhotos(photos);
    renderPhotoGrid();
    checkAchievements();
}

function resizeImage(file, maxSize = 1200) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
            URL.revokeObjectURL(url);
            let { width, height } = img;
            if (width > maxSize || height > maxSize) {
                if (width > height) { height = Math.round(height * maxSize / width); width = maxSize; }
                else { width = Math.round(width * maxSize / height); height = maxSize; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.82));
        };
        img.onerror = reject;
        img.src = url;
    });
}

function handleFileInput(file) {
    if (!file || !file.type.startsWith('image/')) return;
    resizeImage(file).then(dataUrl => {
        addPhoto(dataUrl);
    }).catch(() => alert('사진을 불러오지 못했어요.'));
}

function loadSnacks() {
    try {
        const raw = localStorage.getItem(SNACKS_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(parsed)) return [];
        return parsed.map(item => {
            if (typeof item === 'string') return { name: item, checked: false };
            return { name: String(item?.name || ''), checked: !!item?.checked };
        });
    } catch { return []; }
}

function saveSnacks(snacks) { localStorage.setItem(SNACKS_KEY, JSON.stringify(snacks)); }
function getSnackCount() { return loadSnacks().filter(s => String(s.name || '').trim().length > 0).length; }

function renderSnacks() {
    const snacks = loadSnacks();
    snackList.innerHTML = '';

    if (snacks.length === 0) {
        const empty = document.createElement('div');
        empty.style.opacity = '0.75';
        empty.style.padding = '6px 0';
        empty.textContent = '아직 간식이 없어요. 간식 추가를 눌러서 넣어줘.';
        snackList.appendChild(empty);
        return;
    }

    snacks.forEach((snack, index) => {
        const row = document.createElement('div');
        row.className = 'snack-item';

        row.innerHTML = `
            <input type="checkbox" ${snack.checked ? 'checked' : ''}>
            <input type="text" placeholder="간식 이름" value="${escapeHtml(snack.name)}">
            <button type="button" class="snack-action-btn snack-save-btn">저장</button>
            <button type="button" class="snack-action-btn snack-delete-btn">삭제</button>
        `;

        const checkbox  = row.querySelector('input[type="checkbox"]');
        const input     = row.querySelector('input[type="text"]');
        const saveRowBtn = row.querySelector('.snack-save-btn');
        const deleteRowBtn = row.querySelector('.snack-delete-btn');

        const commit = () => {
            const name = input.value.trim();
            if (!name) { input.focus(); return; }
            const current = loadSnacks();
            if (!current[index]) return;
            current[index] = { name, checked: checkbox.checked };
            saveSnacks(current);
            renderSnacks();
            saveTodaySnapshot();
            checkAchievements();
        };

        saveRowBtn.addEventListener('click', commit);
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); commit(); } });
        checkbox.addEventListener('change', () => {
            const current = loadSnacks();
            if (!current[index]) return;
            current[index] = { name: current[index].name, checked: checkbox.checked };
            saveSnacks(current);
            saveTodaySnapshot();
            checkAchievements();
        });
        deleteRowBtn.addEventListener('click', () => {
            const current = loadSnacks();
            current.splice(index, 1);
            saveSnacks(current);
            renderSnacks();
            saveTodaySnapshot();
            checkAchievements();
        });

        snackList.appendChild(row);
    });
}

function renderStats() {

    const fullDays  = recent.filter(l => l.basket === '가득').length;

        const seven = logs.slice(-7).map(l => l.date);

    }).length;

    statsSummary.innerHTML = `

            <span class="stat-pill good">좋음 ${goodDays}일</span>
            <span class="stat-pill full">가득 ${fullDays}일</span>
            <span class="stat-pill normal">메모 ${memoDays}일</span>
            <span class="stat-pill">📷 ${photoDays}일</span>

        <div style="opacity:.9;font-size:13px;line-height:1.45;">최근 7일 기록을 카드로 정리했어요.</div>
    `;

    if (recent.length === 0) {
        const empty = document.createElement('div');

        empty.innerHTML = '<div class="stat-date">아직 기록이 없어요</div><div class="stat-note">저장 버튼을 누르거나 상태를 바꾸면 여기에 쌓여요.</div>';
        statsList.appendChild(empty);
        return;
    }

    recent.forEach(log => {
        const card = document.createElement('div');
        card.className = 'stat-card';

        const cond  = log.condition || '없음';
        const basket = log.basket || '없음';
        const snackC = Number(log.snackCount || 0);
        const postC  = Number(log.postcardCount || 0);
        const photoC = loadPhotos().filter(p => p.date === log.date).length;

        const condClass   = cond === '좋음' ? 'good' : cond === '보통' ? 'normal' : cond === '나쁨' ? 'bad' : '';
        const basketClass = basket === '가득' ? 'full' : basket === '보통' ? 'normal' : basket === '적음' ? 'bad' : '';

        card.innerHTML = `
            <div class="stat-date">${escapeHtml(formatKoreanDate(log.date))}</div>
            <div class="stat-row">
                <span class="stat-pill ${condClass}">컨디션: ${escapeHtml(cond)}</span>
                <span class="stat-pill ${basketClass}">간식상태: ${escapeHtml(basket)}</span>
                <span class="stat-pill">간식: ${snackC}개</span>
                <span class="stat-pill">엽서: ${postC}개</span>
                <span class="stat-pill">📷 ${photoC}장</span>
            </div>
            <div class="stat-note">메모: ${escapeHtml(log.memo || '-')}</div>
            <div class="stat-note">엽서 메모: ${escapeHtml(log.postcardMemo || '-')}</div>
        `;
        statsList.appendChild(card);
    });
}

function countConsecutiveStreak(predicate) {
    const logs = loadLogs();
    if (logs.length === 0) return 0;
    let i = logs.length - 1;
    if (!predicate(logs[i])) return 0;
    let streak = 1;
    let prevKey = logs[i].date;
    i--;
    while (i >= 0 && predicate(logs[i])) {
        if (isConsecutiveDay(logs[i].date, prevKey)) { streak++; prevKey = logs[i].date; i--; }
        else break;
    }
    return streak;
}

function countStreak(field, value) { return countConsecutiveStreak(log => log[field] === value); }

    const unlocked = new Set(loadUnlockedAchievementNames());

}

    { n: "🍱 풍족",       d: "가득 1일",        xp: 10,  max: 1,   p: () => countDaysWithBasket('가득') },
    { n: "🛒 창고형",     d: "가득 5일",        xp: 35,  max: 5,   p: () => countDaysWithBasket('가득') },
    { n: "🏬 꽉찬 바구니",d: "가득 10일",       xp: 70,  max: 10,  p: () => countDaysWithBasket('가득') },
    { n: "📦 저장러",     d: "가득 3일 연속",   xp: 45,  max: 3,   p: () => countStreak('basket', '가득') },

    { n: "📅 기록 30일",  d: "최근 기록 30일",  xp: 150, max: 30,  p: () => loadLogs().length },
    { n: "🧾 꾸준한 기록",d: "최근 7일 중 5일 메모", xp: 80, max: 5, p: () => countDaysWithMemo() },

    // 📷 사진 도전과제

    { n: "🖼 포토그래퍼", d: "방 사진 10장 저장",     xp: 50,  max: 10, p: () => loadPhotos().length },
    { n: "📷 사진 기록가",d: "방 사진 30장 저장",     xp: 100, max: 30, p: () => loadPhotos().length },
    { n: "🎞 아카이브",   d: "방 사진 100장 저장",    xp: 200, max: 100,p: () => loadPhotos().length },
    { n: "📅 사진 7일",   d: "7일 연속 사진 저장",    xp: 90,  max: 7,  p: () => {
        const dates = [...new Set(loadPhotos().map(p => p.date))].sort();
        if (dates.length === 0) return 0;
        let streak = 1, max = 1;
        for (let i = dates.length - 1; i > 0; i--) {

            else streak = 1;
        }
        return max;
    }},

        return (getCurrentCondition() === '좋음' && getCurrentBasket() === '가득' &&
                String(memoBox.value || '').trim().length > 0) ? 1 : 0;
    }},

        const todayPhotos = loadPhotos().filter(p => p.date === getLocalDateKey()).length;
        return (getCurrentCondition() === '좋음' && getCurrentBasket() === '가득' &&
                String(memoBox.value || '').trim().length > 0 && todayPhotos > 0) ? 1 : 0;
    }},
    { n: "🎁 잘 관리중",  d: "좋음 10일 + 엽서 10개", xp: 120, max: 1,  p: () =>
        (countDaysWithCondition('좋음') >= 10 && (parseInt(postcardCount.value || '0', 10) || 0) >= 10) ? 1 : 0
    },
    { n: "🌙 야행성",     d: "밤에 접속",              xp: 25,  max: 1,  p: () => { const h = new Date().getHours(); return (h >= 0 && h < 5) ? 1 : 0; }},
    { n: "☀️ 아침형",     d: "아침에 접속",             xp: 25,  max: 1,  p: () => { const h = new Date().getHours(); return (h >= 6 && h < 9) ? 1 : 0; }},
    { n: "📊 데이터광",   d: "최근 기록 20개",          xp: 60,  max: 20, p: () => loadLogs().length },
    { n: "🎉 폭죽마스터", d: "XP 300 이상",             xp: 200, max: 1,  p: () => getXP() >= 300 ? 1 : 0 },
    { n: "👑 내방의 신",  d: "XP 600 이상",             xp: 350, max: 1,  p: () => getXP() >= 600 ? 1 : 0 },
    { n: "🤫 비밀 업적",  d: "좋음 + 가득 + 간식 20개 + 메모", xp: 180, max: 1, p: () => {
        return (getCurrentCondition() === '좋음' && getCurrentBasket() === '가득' &&
                getSnackCount() >= 20 && String(memoBox.value || '').trim().length > 0) ? 1 : 0;
    }}
];

function safeAchievementProgress(a) {
    try { const v = a.p(); const n = Number(v); return Number.isFinite(n) ? n : 0; }
    catch { return 0; }
}

function firework() {
    for (let i = 0; i < 24; i++) {
        const f = document.createElement('div');
        f.className = 'firework';
        f.style.background = `hsl(${Math.random() * 360}, 100%, 60%)`;
        f.style.left = (window.innerWidth / 2) + 'px';
        f.style.top  = (window.innerHeight / 2) + 'px';
        f.style.setProperty('--x', `${Math.random() * 320 - 160}px`);
        f.style.setProperty('--y', `${Math.random() * 320 - 160}px`);
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 950);
    }
}

function checkAchievements() {
    const unlocked = new Set(loadUnlockedAchievementNames());
    let changed = true;
    const justUnlocked = [];
    while (changed) {
        changed = false;
        for (const a of allAchievements) {
            if (unlocked.has(a.n)) continue;
            if (safeAchievementProgress(a) >= a.max) {
                unlocked.add(a.n);
                justUnlocked.push(a.n);
                changed = true;
            }
        }
    }
    if (justUnlocked.length > 0) { saveUnlockedAchievementNames([...unlocked]); firework(); }
    renderAchievements();
}

function renderAchievements() {
    achievementList.innerHTML = '';
    const unlocked = new Set(loadUnlockedAchievementNames());
    const totalXP = getXP();
    const maxXP   = allAchievements.reduce((sum, a) => sum + a.xp, 0);
    xpText.textContent = `XP: ${totalXP} / ${maxXP}`;
    xpFill.style.width = (maxXP ? Math.min((totalXP / maxXP) * 100, 100) : 0) + '%';

    allAchievements.forEach(a => {
        const current = safeAchievementProgress(a);
        const percent = a.max ? Math.min((current / a.max) * 100, 100) : 0;
        const card = document.createElement('div');
        card.className = 'achievement ' + (unlocked.has(a.n) ? 'unlocked' : 'locked');
        card.innerHTML = `
            <div class="ach-title">${escapeHtml(a.n)}</div>
            <div class="ach-desc">${escapeHtml(a.d)}</div>
            <div class="ach-meta"><span>${current} / ${a.max}</span><span>XP ${a.xp}</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
        `;
        achievementList.appendChild(card);
    });
}

/* ════════════════════════════════════════
   달력 / 다이어리
════════════════════════════════════════ */
let calendarBaseDate = new Date();
calendarBaseDate.setDate(1);
let selectedDiaryDateKey = getLocalDateKey();

function renderDiaryCalendar() {
    const year  = calendarBaseDate.getFullYear();
    const month = calendarBaseDate.getMonth();
    const logs  = loadLogs();
    const todayKey = getLocalDateKey();

    calendarMonthLabel.textContent = `${year}년 ${month + 1}월`;
    calendarGrid.innerHTML = '';

    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'calendarDay empty';
        calendarGrid.appendChild(empty);
    }

    for (let day = 1; day <= lastDate; day++) {
        const key   = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const entry = logs.find(log => log.date === key);
        const hasPhoto = loadPhotos().some(p => p.date === key);

        const cell = document.createElement('button');
        cell.type = 'button';
        cell.className = 'calendarDay';

        if (key === todayKey)              cell.classList.add('today');
        if (entry)                         cell.classList.add('hasEntry');
        if (key === selectedDiaryDateKey)  cell.classList.add('selected');

        cell.innerHTML = `
            <div class="calendarDayNum">${day}</div>
            <div class="calendarDayDot">${entry ? '●' : ''}${hasPhoto ? '📷' : ''}</div>
        `;

        cell.addEventListener('click', () => {
            selectedDiaryDateKey = key;
            renderDiaryCalendar();
            renderDiaryTimeline(key);
        });
        calendarGrid.appendChild(cell);
    }
    renderDiaryTimeline(selectedDiaryDateKey);
}

function renderDiaryTimeline(dateKey) {
    selectedDateLabel.textContent = formatKoreanDate(dateKey);

    // 사진 섹션
    const diaryPhotoSection = document.getElementById('diaryPhotoSection');
    const diaryPhotoGrid    = document.getElementById('diaryPhotoGrid');
    const dayPhotos = loadPhotos().filter(p => p.date === dateKey);

    if (dayPhotos.length > 0) {
        diaryPhotoSection.style.display = 'block';
        diaryPhotoGrid.innerHTML = '';
        dayPhotos.forEach((photo, idx) => {
            const wrap = document.createElement('div');
            wrap.style.cssText = 'border-radius:16px; overflow:hidden; cursor:pointer; position:relative;';

            const img = document.createElement('img');
            img.src = photo.dataUrl;
            img.alt = '방 사진';
            img.loading = 'lazy';
            img.style.cssText = 'width:100%; display:block; border-radius:16px;';

            const label = document.createElement('div');
            label.style.cssText = 'position:absolute; bottom:8px; right:10px; font-size:12px; font-weight:700; color:rgba(255,255,255,0.8); background:rgba(0,0,0,0.45); padding:3px 8px; border-radius:999px;';
            label.textContent = `${idx + 1} / ${dayPhotos.length}`;

            wrap.appendChild(img);
            wrap.appendChild(label);
            wrap.addEventListener('click', () => openPhotoViewer(photo.id, dayPhotos));
            diaryPhotoGrid.appendChild(wrap);
        });
    } else {
        diaryPhotoSection.style.display = 'none';
    }

    // 메모 섹션 — 선택한 날짜 하나만
    const log = loadLogs().find(l => l.date === dateKey);

    if (!log) {
        memoTimeline.innerHTML = '<div class="memoEmpty">이 날은 저장된 기록이 없어요.</div>';
        return;
    }

    const condition = log.condition || '없음';
    const basket    = log.basket    || '없음';
    const memo      = log.memo      || '메모 없음';
    const postcardMemoText  = log.postcardMemo || '';
    const postcardCountText = `엽서 ${Number(log.postcardCount || 0)}개`;
    const snackCountText    = `간식 ${Number(log.snackCount || 0)}개`;

    memoTimeline.innerHTML = `
        <div class="memoItem">
            <div class="memoItemMeta">
                <span class="stat-pill">${escapeHtml(condition)}</span>
                <span class="stat-pill">${escapeHtml(basket)}</span>
                <span class="stat-pill">${escapeHtml(postcardCountText)}</span>
                <span class="stat-pill">${escapeHtml(snackCountText)}</span>
            </div>
            ${postcardMemoText ? `<div class="memoItemText">${escapeHtml(postcardMemoText)}</div>` : ''}
            <div class="memoItemText">${escapeHtml(memo)}</div>
        </div>
    `;
}

function openDiaryModal() {
    diaryModal.style.display = 'block';
    diaryModal.setAttribute('aria-hidden', 'false');
    calendarBaseDate = new Date();
    calendarBaseDate.setDate(1);
    selectedDiaryDateKey = getLocalDateKey();
    renderDiaryCalendar();
}

function closeDiaryModal() {
    diaryModal.style.display = 'none';
    diaryModal.setAttribute('aria-hidden', 'true');
}

});

openAchievementsBtn.addEventListener('click', () => {
    mainScreen.style.display = 'none';
    achievementScreen.style.display = 'block';
    renderAchievements();
});

backBtn.addEventListener('click', () => {
    achievementScreen.style.display = 'none';
    mainScreen.style.display = 'block';
});

openDiaryBtn.addEventListener('click', openDiaryModal);
closeDiaryBtn.addEventListener('click', closeDiaryModal);

prevMonthBtn.addEventListener('click', () => {
    calendarBaseDate = new Date(calendarBaseDate.getFullYear(), calendarBaseDate.getMonth() - 1, 1);
    renderDiaryCalendar();
});

nextMonthBtn.addEventListener('click', () => {
    calendarBaseDate = new Date(calendarBaseDate.getFullYear(), calendarBaseDate.getMonth() + 1, 1);
    renderDiaryCalendar();
});

diaryModal.addEventListener('click', (e) => { if (e.target === diaryModal) closeDiaryModal(); });

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        if (photoViewer.classList.contains('open')) { photoViewer.classList.remove('open'); return; }
        if (cameraGalleryModal.style.display === 'block') { closeCameraGallery(); return; }
        if (diaryModal.style.display === 'block')         { closeDiaryModal(); return; }
        if (achievementScreen.style.display === 'block')  {
            achievementScreen.style.display = 'none';
            mainScreen.style.display = 'block';
        }
    }
    // 뷰어 방향키
    if (photoViewer.classList.contains('open')) {
        if (e.key === 'ArrowLeft'  && viewerIndex > 0)                           { viewerIndex--; updateViewerDisplay(); }
        if (e.key === 'ArrowRight' && viewerIndex < viewerPhotos.length - 1)    { viewerIndex++; updateViewerDisplay(); }
    }
});

    localStorage.setItem(VISIT_KEY, String(getVisit() + 1));

    updateDisplayTexts();

}

window.addEventListener('load', initialize);
